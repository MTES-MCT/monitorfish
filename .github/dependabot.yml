version: 2
updates:
  - package-ecosystem: "github-actions"
    assignees:
      - "louptheron"
    schedule:
      interval: "monthly"
      time: "03:00"
    commit-message:
      prefix: "[Tech] "
    labels: ["tech. enhancement", "dependencies"]

  - package-ecosystem: "gradle"
    directory: "/backend"
    cooldown:
      default-days: 30
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    assignees:
      - "louptheron"
    schedule:
      interval: "monthly"
      time: "02:00"
    commit-message:
      prefix: "[Tech] Backend - "
    labels: ["tech. enhancement", "dependencies"]
    groups:
      non-major-dependencies:
        applies-to: version-updates
        dependency-type: production
        update-types: ["minor", "patch"]
      non-major-dev-dependencies:
        applies-to: version-updates
        dependency-type: development
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    cooldown:
      default-days: 30
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    assignees:
      - "louptheron"
    schedule:
      interval: "monthly"
      time: "01:00"
    commit-message:
      prefix: "[Tech] Frontend - "
    labels: ["tech. enhancement", "dependencies"]
    ignore:
      - dependency-name: "rsuite"
    groups:
      non-major-dependencies:
        applies-to: version-updates
        dependency-type: production
        update-types: ["minor", "patch"]
      non-major-dev-dependencies:
        applies-to: version-updates
        dependency-type: development
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/pipeline"
    cooldown:
      default-days: 30
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    assignees:
      - "VincentAntoine"
    schedule:
      interval: "weekly"
      time: "04:00"
    commit-message:
      prefix: "[Tech] Python - "
    labels: ["tech. enhancement", "dependencies"]
    groups:
      non-major-dependencies:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      security-updates:
        applies-to: security-updates
        update-types: ["minor", "patch"]
