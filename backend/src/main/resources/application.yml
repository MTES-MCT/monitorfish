server:
    port: ${MONITORFISH_SERVER_PORT}
    use-forward-headers: true
    forward-headers-strategy: framework
    compression:
        enabled: true
        excluded-user-agents: ""
        mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
        min-response-size: 2048

host:
    ip: ${HOST_IP}

monitorfish:
    ajp:
        port: ${MONITORFISH_AJP_PORT}
    database:
        missionsActionsChunkSize: ${MONITORFISH_DATABASE_MISSIONS_ACTIONS_CHUNK_SIZE}
    api:
        protected:
            paths: ${MONITORFISH_API_PROTECTED_PATHS}
            super-user-paths: ${MONITORFISH_API_PROTECTED_SUPER_USER_PATHS}
            public-paths: ${MONITORFISH_API_PROTECTED_PUBLIC_PATHS}
            api-key: ${MONITORFISH_API_PROTECTED_API_KEY}
    oidc:
        enabled: ${MONITORFISH_OIDC_ENABLED}
        bypassEmailDomainsFilter: ${MONITORFISH_OIDC_BYPASS_EMAIL_DOMAINS_FILTER:false}
        clientId: ${MONITORFISH_OIDC_CLIENT_ID:}
        clientSecret: ${MONITORFISH_OIDC_CLIENT_SECRET:}
        redirectUri: ${MONITORFISH_OIDC_REDIRECT_URI:}
        loginUrl: ${MONITORFISH_OIDC_LOGIN_URL}
        successUrl: ${MONITORFISH_OIDC_SUCCESS_URL}
        errorUrl: ${MONITORFISH_OIDC_ERROR_URL}
        authorizedEmailDomains: ${MONITORFISH_OIDC_AUTHORIZED_EMAIL_DOMAINS:}
        issuerUri: ${MONITORFISH_OIDC_ISSUER_URI:}
        issuerUriExternal: ${MONITORFISH_OIDC_ISSUER_URI_EXTERNAL}
        authorizationUri: ${MONITORFISH_OIDC_AUTHORIZATION_URI:}
        tokenUri: ${MONITORFISH_OIDC_TOKEN_URI:}
        userInfoUri: ${MONITORFISH_OIDC_USER_INFO_URI:}
        jwkSetUri: ${MONITORFISH_OIDC_JWK_SET_URI:}
        proxyUrl: ${MONITORFISH_OIDC_PROXY_URL:}
    scheduling:
        enabled: ${MONITORFISH_SCHEDULING_ENABLED}
    sentry:
        enabled: ${MONITORFISH_SENTRY_ENABLED}
        dsn: ${SENTRY_DSN}
    keycloak:
        proxy:
            enabled: ${MONITORFISH_KEYCLOAK_PROXY_ENABLED:false}
    kafka:
        ais:
            enabled: ${MONITORFISH_KAFKA_AIS_ENABLED:false}
            topic: ${MONITORFISH_KAFKA_AIS_TOPIC:monitor.ais.position}
            producer:
                enabled: ${MONITORFISH_KAFKA_AIS_PRODUCER_ENABLED:false}

logging:
    level:
        org.springframework.security.web.authentication.logout: DEBUG

spring:
    threads:
        virtual:
            enabled: false
    jmx:
        enabled: false
    mvc:
        static-path-pattern: "/**"
    resources:
        static-locations: file:${STATIC_FILES_PATH}
    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            jakarta:
                persistence:
                    query:
                        timeout: ${MONITORFISH_DATABASE_QUERY_TIMEOUT}
            hibernate:
                temp:
                    use_jdbc_metadata_defaults: false
                jdbc:
                    time_zone: UTC
                dialect: org.hibernate.dialect.PostgreSQLDialect
                type:
                    preferred_uuid_jdbc_type: CHAR
    flyway:
        locations: ${MONITORFISH_MIGRATION_PATH}
    datasource:
        url: ${ENV_DB_URL}
        driver-class-name: ${ENV_DB_DRIVER_CLASS_NAME}
        hikari:
            max-lifetime: 1800000
            maximum-pool-size: ${MONITORFISH_DATABASE_HIKARI_MAX_POOL_SIZE:30}
    servlet:
        multipart:
            max-file-size: 5MB
    kafka:
        bootstrap-servers: ${MONITORFISH_KAFKA_AIS_SERVERS:}
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        consumer:
            group-id: ${MONITORFISH_KAFKA_AIS_GROUP_ID:monitorfish}
            auto-offset-reset: latest
            max-poll-records: ${MONITORFISH_KAFKA_AIS_BATCH_SIZE:100}
            fetch-max-wait: ${MONITORFISH_KAFKA_AIS_FETCH_MAX_WAIT:1s}
        properties:
            max.poll.interval.ms: ${MONITORFISH_KAFKA_AIS_TIMEOUT:300000}
            security.protocol: SSL
            ssl.keystore.location: ${MONITORFISH_KAFKA_AIS_KEYSTORE:}
            ssl.keystore.password: ${MONITORFISH_KAFKA_AIS_KEYSTORE_PASSWORD:}
            ssl.key.password: ${MONITORFISH_KAFKA_AIS_KEY_PASSWORD:}
            ssl.keystore.type: PKCS12
            ssl.truststore.location: ${MONITORFISH_KAFKA_AIS_TRUSTSTORE:}
            ssl.truststore.password: ${MONITORFISH_KAFKA_AIS_TRUSTSTORE_PASSWORD:}
            ssl.truststore.type: PKCS12

monitorenv:
    url: ${MONITORENV_URL}

log4j2:
    script:
        enableLanguages: javascript

springdoc:
    packagesToScan: fr.gouv.cnsp.monitorfish
